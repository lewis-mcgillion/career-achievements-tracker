name: Fetch GitHub Activity

on:
  schedule:
    # Run at midnight UTC on the 1st of every month
    - cron: "0 0 1 * *"
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD) for backfill. Defaults to previous month."
        required: false
        type: string
      end_date:
        description: "End date (YYYY-MM-DD) for backfill. Defaults to end of previous month."
        required: false
        type: string

permissions:
  contents: write
  issues: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Determine date range
        id: dates
        env:
          INPUT_START_DATE: ${{ inputs.start_date }}
          INPUT_END_DATE: ${{ inputs.end_date }}
        run: |
          # Validate date format if provided (YYYY-MM-DD only)
          if [ -n "$INPUT_START_DATE" ]; then
            if [[ ! "$INPUT_START_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              echo "::error::Invalid start_date format. Use YYYY-MM-DD."; exit 1
            fi
            echo "start_date=$INPUT_START_DATE" >> "$GITHUB_OUTPUT"
          else
            echo "start_date=$(date -d 'last month' '+%Y-%m-01' 2>/dev/null || date -v-1m '+%Y-%m-01')" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$INPUT_END_DATE" ]; then
            if [[ ! "$INPUT_END_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              echo "::error::Invalid end_date format. Use YYYY-MM-DD."; exit 1
            fi
            echo "end_date=$INPUT_END_DATE" >> "$GITHUB_OUTPUT"
          else
            echo "end_date=$(date -d "$(date '+%Y-%m-01') - 1 day" '+%Y-%m-%d' 2>/dev/null || date -v1d -v-1d '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          fi

          # Compute target months list (YYYY-MM) from date range for the summary issue
          START="${INPUT_START_DATE:-$(date -d 'last month' '+%Y-%m-01' 2>/dev/null || date -v-1m '+%Y-%m-01')}"
          END="${INPUT_END_DATE:-$(date -d "$(date '+%Y-%m-01') - 1 day" '+%Y-%m-%d' 2>/dev/null || date -v1d -v-1d '+%Y-%m-%d')}"
          MONTHS=""
          CUR=$(date -d "$START" '+%Y-%m' 2>/dev/null || date -j -f '%Y-%m-%d' "$START" '+%Y-%m')
          END_M=$(date -d "$END" '+%Y-%m' 2>/dev/null || date -j -f '%Y-%m-%d' "$END" '+%Y-%m')
          while [ "$CUR" \< "$END_M" ] || [ "$CUR" = "$END_M" ]; do
            [ -n "$MONTHS" ] && MONTHS="$MONTHS,"
            MONTHS="$MONTHS$CUR"
            # Advance by one month
            NEXT=$(date -d "${CUR}-01 + 1 month" '+%Y-%m' 2>/dev/null || date -j -v+1m -f '%Y-%m-%d' "${CUR}-01" '+%Y-%m')
            CUR="$NEXT"
          done
          echo "months=$MONTHS" >> "$GITHUB_OUTPUT"

      - name: Fetch activity data
        env:
          GITHUB_TOKEN: ${{ secrets.CAREER_DATA_PAT }}
          TRACKED_REPOS: ${{ secrets.TRACKED_REPOS }}
        run: |
          npx tsx scripts/fetch-activity.ts \
            --start-date "${{ steps.dates.outputs.start_date }}" \
            --end-date "${{ steps.dates.outputs.end_date }}" \
            --username "${{ github.repository_owner }}" \
            --output-dir "./fetched-data"

      - name: Push data to private career-data repo
        env:
          PAT: ${{ secrets.CAREER_DATA_PAT }}
        run: |
          # Clone using credential helper to avoid PAT in URLs/logs
          git -c "credential.helper=!f(){ echo username=x-access-token; echo password=${PAT}; };f" \
            clone https://github.com/${{ github.repository_owner }}/career-data.git /tmp/career-data
          cp -r ./fetched-data/* /tmp/career-data/data/ 2>/dev/null || true
          cd /tmp/career-data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No new data to commit"
          else
            git commit -q -m "data: activity fetch

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
            git -c "credential.helper=!f(){ echo username=x-access-token; echo password=${PAT}; };f" \
              push -q
            echo "✅ Data pushed"
          fi

      - name: Create Copilot agent issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TARGET_MONTHS: ${{ steps.dates.outputs.months }}
        run: |
          ISSUE_BODY=$(cat <<'ISSUE_EOF'
          ## Task: Generate Achievement Summary

          Generate achievement summaries for the following months: **TARGET_MONTHS_PLACEHOLDER**

          ### Instructions

          1. **Read the raw data** from the private data repo already cloned at
             `/tmp/career-data`. Read JSON files from `/tmp/career-data/data/YYYY-MM/`:
             - `issues-created.json` — Issues I opened
             - `issues-assigned.json` — Issues assigned to me
             - `prs-created.json` — PRs I authored
             - `prs-assigned.json` — PRs assigned to me
             - `pr-reviews.json` — PR reviews I performed
             - `issue-comments.json` — My issue comments
             - `pr-comments.json` — My PR review comments

          2. **Generate/update a monthly achievement file** at `/tmp/career-data/achievements/YYYY-MM.md`:
             - Use the template at `/tmp/career-data/achievements/TEMPLATE.md` for structure
             - Follow ALL sanitization rules in `.github/copilot-instructions.md`
             - Focus on impact, themes, and accomplishments — NOT raw activity

          3. **Update `/tmp/career-data/achievements/SUMMARY.md`**:
             - Add/update the entry for each processed month
             - Keep entries in chronological order

          4. **Commit and push to the private repo only**:
             ```bash
             cd /tmp/career-data
             git add achievements/*.md
             git diff --cached --stat  # verify only .md files staged
             git commit -m "Update achievements for TARGET_MONTHS_PLACEHOLDER"
             git push
             ```

          ### Important Reminders
          - Read `.github/copilot-instructions.md` for full sanitization and safety rules
          - ALL output goes to the PRIVATE career-data repo, not the public profile repo
          - NEVER include internal repo names, issue numbers, or direct links
          - NEVER print JSON file contents to stdout (your output is visible here)
          - NEVER run `git add .` — only `git add achievements/*.md`
          - NEVER read files in `/tmp/career-data/.git/`
          ISSUE_EOF
          )

          ISSUE_BODY="${ISSUE_BODY//TARGET_MONTHS_PLACEHOLDER/$TARGET_MONTHS}"

          gh issue create \
            --title "Generate achievement summary for ${TARGET_MONTHS}" \
            --body "$ISSUE_BODY" \
            --label "copilot"

      - name: Clean up sensitive data
        if: always()
        run: |
          rm -rf ./fetched-data /tmp/career-data
