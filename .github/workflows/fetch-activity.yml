name: Fetch GitHub Activity

on:
  schedule:
    # Run at midnight UTC on the 1st of every month
    - cron: "0 0 1 * *"
  workflow_dispatch:
    inputs:
      start_date:
        description: "Start date (YYYY-MM-DD) for backfill. Defaults to previous month."
        required: false
        type: string
      end_date:
        description: "End date (YYYY-MM-DD) for backfill. Defaults to end of previous month."
        required: false
        type: string
      force_regenerate:
        description: "Regenerate achievement files even if they already exist"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  fetch-and-generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Clone private career-data repo
        env:
          PAT: ${{ secrets.CAREER_DATA_PAT }}
        run: |
          git -c "credential.helper=!f(){ echo username=x-access-token; echo password=${PAT}; };f" \
            clone https://github.com/${{ github.repository_owner }}/career-data.git /tmp/career-data
          echo "✅ career-data cloned"
          echo "Existing data months:"
          ls /tmp/career-data/data/ 2>/dev/null || echo "  (none)"

      - name: Determine date range
        id: dates
        env:
          INPUT_START_DATE: ${{ inputs.start_date }}
          INPUT_END_DATE: ${{ inputs.end_date }}
        run: |
          # Validate date format if provided (YYYY-MM-DD only)
          if [ -n "$INPUT_START_DATE" ]; then
            if [[ ! "$INPUT_START_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              echo "::error::Invalid start_date format. Use YYYY-MM-DD."; exit 1
            fi
            echo "start_date=$INPUT_START_DATE" >> "$GITHUB_OUTPUT"
          else
            echo "start_date=$(date -d 'last month' '+%Y-%m-01' 2>/dev/null || date -v-1m '+%Y-%m-01')" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "$INPUT_END_DATE" ]; then
            if [[ ! "$INPUT_END_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
              echo "::error::Invalid end_date format. Use YYYY-MM-DD."; exit 1
            fi
            echo "end_date=$INPUT_END_DATE" >> "$GITHUB_OUTPUT"
          else
            echo "end_date=$(date -d "$(date '+%Y-%m-01') - 1 day" '+%Y-%m-%d' 2>/dev/null || date -v1d -v-1d '+%Y-%m-%d')" >> "$GITHUB_OUTPUT"
          fi

          # Compute target months list (YYYY-MM) from date range
          START="${INPUT_START_DATE:-$(date -d 'last month' '+%Y-%m-01' 2>/dev/null || date -v-1m '+%Y-%m-01')}"
          END="${INPUT_END_DATE:-$(date -d "$(date '+%Y-%m-01') - 1 day" '+%Y-%m-%d' 2>/dev/null || date -v1d -v-1d '+%Y-%m-%d')}"
          MONTHS=""
          CUR=$(date -d "$START" '+%Y-%m' 2>/dev/null || date -j -f '%Y-%m-%d' "$START" '+%Y-%m')
          END_M=$(date -d "$END" '+%Y-%m' 2>/dev/null || date -j -f '%Y-%m-%d' "$END" '+%Y-%m')
          while [ "$CUR" \< "$END_M" ] || [ "$CUR" = "$END_M" ]; do
            [ -n "$MONTHS" ] && MONTHS="$MONTHS,"
            MONTHS="$MONTHS$CUR"
            NEXT=$(date -d "${CUR}-01 + 1 month" '+%Y-%m' 2>/dev/null || date -j -v+1m -f '%Y-%m-%d' "${CUR}-01" '+%Y-%m')
            CUR="$NEXT"
          done
          echo "months=$MONTHS" >> "$GITHUB_OUTPUT"

      - name: Determine months to fetch
        id: skip
        run: |
          # Check which months already have data in career-data
          IFS=',' read -ra ALL_MONTHS <<< "${{ steps.dates.outputs.months }}"
          NEED_FETCH=""
          ALREADY_HAVE=""
          for M in "${ALL_MONTHS[@]}"; do
            if [ -d "/tmp/career-data/data/$M" ] && [ -f "/tmp/career-data/data/$M/prs-created.json" ]; then
              [ -n "$ALREADY_HAVE" ] && ALREADY_HAVE="$ALREADY_HAVE,"
              ALREADY_HAVE="$ALREADY_HAVE$M"
            else
              [ -n "$NEED_FETCH" ] && NEED_FETCH="$NEED_FETCH,"
              NEED_FETCH="$NEED_FETCH$M"
            fi
          done

          echo "need_fetch=$NEED_FETCH" >> "$GITHUB_OUTPUT"
          echo "already_have=$ALREADY_HAVE" >> "$GITHUB_OUTPUT"

          if [ -n "$ALREADY_HAVE" ]; then
            echo "⏭  Already have data for: $ALREADY_HAVE"
          fi
          if [ -n "$NEED_FETCH" ]; then
            echo "📥 Need to fetch: $NEED_FETCH"
          else
            echo "✅ All requested months already have data — skipping fetch"
          fi

      - name: Fetch activity data
        if: steps.skip.outputs.need_fetch != ''
        env:
          GITHUB_TOKEN: ${{ secrets.CAREER_DATA_PAT }}
          TRACKED_REPOS: ${{ secrets.TRACKED_REPOS }}
        run: |
          # Compute date range from the months that need fetching
          IFS=',' read -ra FETCH_MONTHS <<< "${{ steps.skip.outputs.need_fetch }}"
          FIRST="${FETCH_MONTHS[0]}"
          LAST="${FETCH_MONTHS[${#FETCH_MONTHS[@]}-1]}"
          FETCH_START="${FIRST}-01"
          # End date = last day of the last month
          FETCH_END=$(date -d "${LAST}-01 + 1 month - 1 day" '+%Y-%m-%d' 2>/dev/null || \
            date -j -v+1m -v-1d -f '%Y-%m-%d' "${LAST}-01" '+%Y-%m-%d')

          echo "Fetching from $FETCH_START to $FETCH_END"
          npx tsx scripts/fetch-activity.ts \
            --start-date "$FETCH_START" \
            --end-date "$FETCH_END" \
            --username "${{ github.repository_owner }}" \
            --output-dir "./fetched-data"

      - name: Copy fetched data to career-data
        if: steps.skip.outputs.need_fetch != ''
        run: |
          cp -r ./fetched-data/* /tmp/career-data/data/ 2>/dev/null || true

      - name: Generate achievement summaries
        env:
          FORCE_REGEN: ${{ inputs.force_regenerate }}
        run: |
          FORCE_FLAG=""
          if [ "$FORCE_REGEN" = "true" ]; then
            FORCE_FLAG="--force"
          fi

          npx tsx scripts/generate-achievements.ts \
            --data-dir "/tmp/career-data/data" \
            --achievements-dir "/tmp/career-data/achievements" \
            --months "${{ steps.dates.outputs.months }}" \
            $FORCE_FLAG

      - name: Commit and push to career-data
        env:
          PAT: ${{ secrets.CAREER_DATA_PAT }}
        run: |
          cd /tmp/career-data
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git diff --cached --stat
            git commit -q -m "update: activity data and achievements

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
            git -c "credential.helper=!f(){ echo username=x-access-token; echo password=${PAT}; };f" \
              push -q
            echo "✅ Changes pushed to career-data"
          fi

      - name: Clean up sensitive data
        if: always()
        run: |
          rm -rf ./fetched-data /tmp/career-data
